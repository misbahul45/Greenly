networks:
  greenly_network:
    name: greenly_network

volumes:
  mysql_data:
  mongo_data:
  redis_data:
  core_node_modules:
  catalog_node_modules:
  ml_venv:
  go_mod_cache:

services:
  traefik:
    image: traefik:v2.11
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=greenly_network"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - greenly_network

  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: greenly_core
      MYSQL_USER: greenly
      MYSQL_PASSWORD: greenly
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - greenly_network

  mongodb:
    image: mongo:7
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - greenly_network

  redis:
    image: redis:7
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - greenly_network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: greenly_rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - greenly_network

  core-service:
    build:
      context: ./services/core-service
      dockerfile: Dockerfile.dev
    volumes:
    - core_node_modules:/app/node_modules

    depends_on:
      - mysql
      - redis
      - rabbitmq

    environment:
      DATABASE_HOST: mysql
      DATABASE_PORT: 3306
      DATABASE_USER: greenly
      DATABASE_PASSWORD: greenly
      DATABASE_NAME: greenly_core
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      ML_ENGINE_URL: http://ml-engine:8000
      JWT_ACCESS_SECRET_KEY: greenly-dev-access-secret
      JWT_REFRESH_SECRET_KEY: greenly-dev-refresh-secret
      JWT_ACCESS_EXPIRES: 30d
      JWT_REFRESH_EXPIRES: 30d
      API_URL: http://localhost/api/core
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_SUCCESS_URL: ${STRIPE_SUCCESS_URL:-http://localhost/payment-success?session_id={CHECKOUT_SESSION_ID}}
      STRIPE_CANCEL_URL: ${STRIPE_CANCEL_URL:-http://localhost/payment-cancel?session_id={CHECKOUT_SESSION_ID}}
      STRIPE_CURRENCY: ${STRIPE_CURRENCY:-idr}
      STRIPE_CHECKOUT_EXPIRES_HOURS: ${STRIPE_CHECKOUT_EXPIRES_HOURS:-24}

    develop:
      watch:
        - action: sync
          path: ./services/core-service
          target: /app
          ignore:
            - node_modules/
            - dist/

        - action: rebuild
          path: ./services/core-service/package.json

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.core.rule=PathPrefix(`/api/core`)"
      - "traefik.http.routers.core.entrypoints=web"
      - "traefik.http.services.core.loadbalancer.server.port=3000"
      - "traefik.http.middlewares.core-strip.stripprefix.prefixes=/api/core"
      - "traefik.http.routers.core.middlewares=core-strip"

    networks:
      - greenly_network

  ml-engine:
    build:
      context: ./services/ml-engine
      dockerfile: Dockerfile.dev

    volumes:
      - ./services/ml-engine:/app
      - ml_venv:/app/.venv

    depends_on:
      - catalog-service
      - redis
      - rabbitmq

    environment:
      ML_PORT: 8000
      MODEL_NAME: sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
      CATALOG_SERVICE_URL: http://catalog-service:8081
      CORE_SERVICE_URL: http://core-service:3000
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      REDIS_URL: redis://redis:6379/0
      FAISS_INDEX_PATH: /app/app/storage/indexes/products.faiss
      PRODUCT_META_PATH: /app/app/storage/indexes/products_meta.json

    develop:
      watch:
        - action: sync
          path: ./services/ml-engine
          target: /app

        - action: rebuild
          path: ./services/ml-engine/pyproject.toml

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ml.rule=PathPrefix(`/api/ml`)"
      - "traefik.http.routers.ml.entrypoints=web"
      - "traefik.http.services.ml.loadbalancer.server.port=8000"
      - "traefik.http.middlewares.ml-strip.stripprefix.prefixes=/api/ml"
      - "traefik.http.routers.ml.middlewares=ml-strip"

    networks:
      - greenly_network

  catalog-service:
    build:
      context: ./services/catalog-service
      dockerfile: Dockerfile.dev

    depends_on:
      - rabbitmq
      - mongodb
      - redis
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      MONGODB_URI: mongodb://root:root@mongodb:27017/?authSource=admin
      MONGODB_URL: mongodb://root:root@mongodb:27017/?authSource=admin
      CORE_SERVICE_URL: http://core-service:3000
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_ACCESS_SECRET_KEY: greenly-dev-access-secret

    develop:
      watch:
        - action: sync
          path: ./services/catalog-service
          target: /app

        - action: rebuild
          path: ./services/catalog-service/go.mod

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.catalog.rule=PathPrefix(`/api/catalog`)"
      - "traefik.http.routers.catalog.entrypoints=web"
      - "traefik.http.services.catalog.loadbalancer.server.port=8081"
      - "traefik.http.middlewares.catalog-strip.stripprefix.prefixes=/api/catalog"
      - "traefik.http.routers.catalog.middlewares=catalog-strip"

    networks:
      - greenly_network
