networks:
  greenly_network:
    name: ${COMPOSE_PROJECT_NAME:-greenly}_network

volumes:
  # mysql_data:       # Cloud: Railway MySQL
  # mongo_data:       # Cloud: MongoDB Atlas
  # redis_data:       # Cloud: Upstash Redis
  core_node_modules:
  catalog_node_modules:
  ml_venv:
  go_mod_cache:
  flutter_pub_cache:
  flutter_gradle_cache:
  flutter_android_sdk:

services:
  traefik:
    image: traefik:v2.11
    command:
      - "--api.insecure=${TRAEFIK_API_INSECURE:-true}"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=${COMPOSE_PROJECT_NAME:-greenly}_network"
      - "--entrypoints.web.address=:${HTTP_PORT:-80}"
    ports:
      - "${HTTP_PORT:-80}:${HTTP_PORT:-80}"
      - "${TRAEFIK_DASHBOARD_PORT:-8080}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - greenly_network

