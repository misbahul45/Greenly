networks:
  greenly_network:
    name: ${COMPOSE_PROJECT_NAME:-greenly}_network

volumes:
  # mysql_data:       # Cloud: Railway MySQL
  # mongo_data:       # Cloud: MongoDB Atlas
  # redis_data:       # Cloud: Upstash Redis
  go_mod_cache:
  # flutter_pub_cache:
  # flutter_gradle_cache:
  # flutter_android_sdk:

services:
  traefik:
    image: traefik:v2.11
    command:
      - "--api.insecure=${TRAEFIK_API_INSECURE:-false}"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=${COMPOSE_PROJECT_NAME:-greenly}_network"
      - "--entrypoints.web.address=:${HTTP_PORT:-80}"
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:${HTTP_PORT:-80}"
      - "${TRAEFIK_DASHBOARD_PORT:-8080}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - greenly_network

  # mysql:      # Local development only. Production uses Railway MySQL.
  # mongodb:    # Local development only. Production uses MongoDB Atlas.
  # redis:      # Local development only. Production uses Upstash Redis.
  # rabbitmq:   # Local development only. Production uses CloudAMQP.

  core-service:
    build:
      context: ./services/core-service
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env

    # depends_on:
    #   # mysql     - Cloud: Railway MySQL
    #   # redis     - Cloud: Upstash Redis
    #   # rabbitmq  - Cloud: CloudAMQP

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.core.rule=PathPrefix(`/api/core`)"
      - "traefik.http.routers.core.entrypoints=web"
      - "traefik.http.services.core.loadbalancer.server.port=3000"
      - "traefik.http.middlewares.core-strip.stripprefix.prefixes=/api/core"
      - "traefik.http.routers.core.middlewares=core-strip"

    networks:
      - greenly_network

  ml-engine:
    build:
      context: ./services/ml-engine
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env

    depends_on:
      - catalog-service
      # redis     - Cloud: Upstash Redis
      # rabbitmq  - Cloud: CloudAMQP

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ml.rule=PathPrefix(`/api/ml`)"
      - "traefik.http.routers.ml.entrypoints=web"
      - "traefik.http.services.ml.loadbalancer.server.port=8000"
      - "traefik.http.middlewares.ml-strip.stripprefix.prefixes=/api/ml"
      - "traefik.http.routers.ml.middlewares=ml-strip"

    networks:
      - greenly_network

  # ml-worker (Celery) dimatikan di production
  # ml-worker:
  #   build:
  #     context: ./services/ml-engine
  #     dockerfile: Dockerfile
  #   env_file:
  #     - .env
  #   command: uv run celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
  #   networks:
  #     - greenly_network

  catalog-service:
    build:
      context: ./services/catalog-service
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env

    # depends_on:
    #   # rabbitmq  - Cloud: CloudAMQP
    #   # mongodb   - Cloud: MongoDB Atlas
    #   # redis     - Cloud: Upstash Redis

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.catalog.rule=PathPrefix(`/api/catalog`)"
      - "traefik.http.routers.catalog.entrypoints=web"
      - "traefik.http.services.catalog.loadbalancer.server.port=8081"
      - "traefik.http.middlewares.catalog-strip.stripprefix.prefixes=/api/catalog"
      - "traefik.http.routers.catalog.middlewares=catalog-strip"

    networks:
      - greenly_network