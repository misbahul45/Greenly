networks:
  greenly_network:
    name: ${COMPOSE_PROJECT_NAME:-greenly}_network

volumes:
  # mysql_data:       # Cloud: Railway MySQL
  # mongo_data:       # Cloud: MongoDB Atlas
  # redis_data:       # Cloud: Upstash Redis
  go_mod_cache:
  # flutter_pub_cache:
  # flutter_gradle_cache:
  # flutter_android_sdk:

services:
  traefik:
    image: traefik:v2.11
    restart: unless-stopped
    command:
      - "--configFile=/etc/traefik/traefik.yml"
    environment:
      - DUCKDNS_TOKEN=${DUCKDNS_TOKEN}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "443:443"
      - "${TRAEFIK_DASHBOARD_PORT:-8080}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
      - ./dynamic.yml:/etc/traefik/dynamic.yml:ro
      - ./letsencrypt:/letsencrypt
    networks:
      - greenly_network

  # mysql:      # Local development only. Production uses Railway MySQL.
  # mongodb:    # Local development only. Production uses MongoDB Atlas.
  # redis:      # Local development only. Production uses Upstash Redis.
  # rabbitmq:   # Local development only. Production uses CloudAMQP.

  core-service:
    build:
      context: ./services/core-service
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.core-secure.rule=Host(`greenly-api.duckdns.org`) && PathPrefix(`/api/core`)"
      - "traefik.http.routers.core-secure.entrypoints=websecure"
      - "traefik.http.routers.core-secure.tls=true"
      - "traefik.http.routers.core-secure.tls.certresolver=duckdns"
      - "traefik.http.middlewares.core-strip.stripprefix.prefixes=/api/core"
      - "traefik.http.routers.core-secure.middlewares=core-strip,security-headers@file,rate-limit@file"
      - "traefik.http.services.core.loadbalancer.server.port=3000"
    networks:
      - greenly_network

  ml-engine:
    build:
      context: ./services/ml-engine
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - catalog-service
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ml-secure.rule=Host(`greenly-api.duckdns.org`) && PathPrefix(`/api/ml`)"
      - "traefik.http.routers.ml-secure.entrypoints=websecure"
      - "traefik.http.routers.ml-secure.tls=true"
      - "traefik.http.routers.ml-secure.tls.certresolver=duckdns"
      - "traefik.http.middlewares.ml-strip.stripprefix.prefixes=/api/ml"
      - "traefik.http.routers.ml-secure.middlewares=ml-strip,security-headers@file,rate-limit@file"
      - "traefik.http.services.ml.loadbalancer.server.port=8000"
    networks:
      - greenly_network

  catalog-service:
    build:
      context: ./services/catalog-service
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.catalog-secure.rule=Host(`greenly-api.duckdns.org`) && PathPrefix(`/api/catalog`)"
      - "traefik.http.routers.catalog-secure.entrypoints=websecure"
      - "traefik.http.routers.catalog-secure.tls=true"
      - "traefik.http.routers.catalog-secure.tls.certresolver=duckdns"
      - "traefik.http.middlewares.catalog-strip.stripprefix.prefixes=/api/catalog"
      - "traefik.http.routers.catalog-secure.middlewares=catalog-strip,security-headers@file,rate-limit@file"
      - "traefik.http.services.catalog.loadbalancer.server.port=8081"
    networks:
      - greenly_network